spring.application.name=application
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=*
management.endpoint.shutdown.enabled=true
management.endpoints.web.base-path=/admin/actuator
management.metrics.export.prometheus.enabled=true
spring.security.user.name=admin
spring.security.user.password=secret

resilience4j.ratelimiter.instances.UniversityControllerRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.UniversityControllerRateLimiter.limit-refresh-period=5s
resilience4j.ratelimiter.instances.UniversityControllerRateLimiter.timeout-duration=1s
resilience4j.ratelimiter.instances.CourseControllerRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.CourseControllerRateLimiter.limit-refresh-period=5s
resilience4j.ratelimiter.instances.CourseControllerRateLimiter.timeout-duration=1s

resilience4j.circuitbreaker.instances.BookControllerCircuitBreaker.failure-rate-threshold=43
resilience4j.circuitbreaker.instances.BookControllerCircuitBreaker.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.BookControllerCircuitBreaker.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.BookControllerCircuitBreaker.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.BookControllerCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.CourseControllerCircuitBreaker.failure-rate-threshold=43
resilience4j.circuitbreaker.instances.CourseControllerCircuitBreaker.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.CourseControllerCircuitBreaker.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.CourseControllerCircuitBreaker.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.CourseControllerCircuitBreaker.sliding-window-size=20

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true